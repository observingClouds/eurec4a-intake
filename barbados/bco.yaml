plugins:
  source:
    - module: intake_xarray

sources:
  CORAL_LIDAR:
    description: Observations made with the CORAL LIDAR at BCO
    driver: opendap
    args:
      urlpath: https://observations.ipsl.fr/thredds/dodsC/EUREC4A/BARBADOS/BCO/Raman_Lidar_CORAL/lowResolution/version_{{version}}/T{{dt}}min/nc/coral_{{date.strftime("%y%m%d")}}_0002_0000_{{content_type}}.nc
      auth: null
      chunks: null
    parameters:
      version:
        description: dataset version to use
        type: str
        default: 2020.07.27
      date:
        description: date of observation
        default: 2020-01-09
        type: datetime
        min: 2020-01-09
        max: 2020-02-29
      dt:
        description: time resolution
        type: int
        default: 10
        allowed: [10, 20, 60]
      content_type:
        description: dataset-content
        type: str
        default: b
        allowed: [b, t]
    metadata:
      maintainer: Leif Denby <l.c.denby[at]leeds.ac.uk>
      documentation: https://wiki.mpimet.mpg.de/doku.php?id=analysis:data:bco:ramanlidars:raman-lidar-coral
      tags:
        - water-vapour profiles
        - temperature profiles

  downwelling_radiation:
    description: Observations made with various surface broadband radiation sensors at BCO
    driver: opendap
    args:
      urlpath: https://observations.ipsl.fr/thredds/dodsC/EUREC4A/BARBADOS/BCO/DownwellingRadiation/{{version}}/EUREC4A_BCO_DownwellingRadiation_202001-202002_{{version}}.nc
      auth: null
      chunks: null
    parameters:
      version:
        description: dataset version to use
        type: str
        default: "v1.0.0"
        allowed: ["v1.0.0"]
    metadata:
      maintainer: Hauke Schulz <hauke.schulz[at]mpimet.mpg.de>
      documentation: https://wiki.mpimet.mpg.de/doku.php?id=observations:bco:radiation
      tags:
        - downwelling radiation
